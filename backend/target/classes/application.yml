server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: gaokao-advisor
  
  datasource:
    url: jdbc:sqlite:./data/gaokao.db
    driver-class-name: org.sqlite.JDBC
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        jdbc:
          time_zone: GMT+8

# AI配置
ai:
  ollama:
    base-url: http://localhost:11434/v1
    model: qwen2:7b

# 日志配置
logging:
  level:
    root: INFO
    com.example.gaokao: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
